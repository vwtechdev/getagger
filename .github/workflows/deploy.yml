name: Deploy to PythonAnywhere
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via PA API
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USER: ${{ secrets.PA_USERNAME }}
          PA_DOMAIN: ${{ secrets.PA_DOMAIN }}
        run: |
          CONSOLE=$(curl -s -X POST \
            -H "Authorization: Token $PA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"executable": "bash"}' \
            "https://www.pythonanywhere.com/api/v0/user/$PA_USER/consoles/" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")

          CMDS=$(cat <<CMDS_EOF
            cd /home/$PA_USER/getagger
            git pull origin main
            source /home/$PA_USER/.virtualenvs/venv/bin/activate
            pip install -r requirements.txt
            python manage.py collectstatic --noinput
            python manage.py makemigrations
            python manage.py migrate
          CMDS_EOF
          )

          while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            curl -s -X POST \
              -H "Authorization: Token $PA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"input\": \"$cmd\\n\"}" \
              "https://www.pythonanywhere.com/api/v0/user/$PA_USER/consoles/$CONSOLE/send_input/"
          done <<< "$CMDS"

          sleep 3

          curl -s -X POST \
            -H "Authorization: Token $PA_TOKEN" \
            "https://www.pythonanywhere.com/api/v0/user/$PA_USER/webapps/$PA_DOMAIN/reload/"
