{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <a href="{% url 'invoices:invoice_detail' pk=invoice.pk %}"
       class="btn btn-outline-secondary btn-sm"
       style="display:inline-flex;align-items:center;justify-content:center;gap:4px"
       aria-label="Voltar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
    </a>
    <div class="d-flex gap-2">
        <button type="button"
                class="btn btn-sm d-none d-md-inline-flex"
                x-data="{ disabled: false }"
                :disabled="disabled"
                @click="disabled = true"
                :title="disabled ? 'Associação já realizada' : 'Associar Automaticamente'"
                style="display:inline-flex;align-items:center;justify-content:center;gap:6px;
                       background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.15));
                       border: 1px solid rgba(139,92,246,0.3); color: #A78BFA; border-radius: 10px;
                       padding: 6px 14px; font-weight: 500; font-size: 0.8rem;"
                hx-post="{% url 'associations:association_auto_match' pk=invoice.pk %}"
                hx-target="#board"
                hx-swap="innerHTML">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8L12 2z"/>
            </svg>
            Associar Automaticamente
        </button>
        <a href="{% url 'labels:part_labels_pdf' pk=invoice.pk %}"
           class="btn btn-success btn-sm"
           style="display:inline-flex;align-items:center;justify-content:center;gap:4px"
           target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
            </svg>
            Etiquetas
        </a>
        <a href="{% url 'invoices:invoice_labels_pdf' pk=invoice.pk %}"
           class="btn btn-outline-secondary btn-sm"
           style="display:inline-flex;align-items:center;justify-content:center;gap:4px"
           target="_blank">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            Romaneio
        </a>
    </div>
</div>

<div id="board" hx-target="#board" hx-swap="innerHTML">
    {% include "associations/association_board.html" %}
</div>
{% endblock %}

{% block scripts %}
<script>
(function () {
    const createUrl = "{% url 'associations:association_create' pk=invoice.pk %}";

    function csrfToken() {
        const m = document.cookie.match(/csrftoken=([^;]+)/);
        return m ? m[1] : '';
    }

    function initBoard() {
        const nfList = document.getElementById('nf-items');
        if (nfList && !nfList.__sortable) {
            Sortable.create(nfList, {
                group: { name: 'nf', pull: 'clone', put: false },
                sort: true, animation: 150,
            });
            nfList.__sortable = true;
        }
        document.querySelectorAll('.service-call-drop').forEach(function (zone) {
            if (zone.__sortable) return;
            Sortable.create(zone, {
                group: { name: 'nf', put: true },
                sort: false, animation: 150,
                onAdd: function (evt) {
                    const itemEl = evt.item;
                    const itemId = itemEl.dataset.itemId;
                    const callId = zone.dataset.serviceCallId;
                    if (itemEl.parentNode) itemEl.parentNode.removeChild(itemEl);
                    if (!itemId || !callId) return;
                    fetch(createUrl, {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: {
                            'X-CSRFToken': csrfToken(),
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ item_id: itemId, service_call_id: callId }),
                    }).then(function (r) { return r.text(); }).then(function (html) {
                        const board = document.getElementById('board');
                        board.innerHTML = html;
                        initBoard();
                    });
                },
            });
            zone.__sortable = true;
        });
    }

    document.body.addEventListener('htmx:afterSwap', function (e) {
        if (e.detail.target && e.detail.target.id === 'board') initBoard();
    });
    document.addEventListener('DOMContentLoaded', initBoard);
})();
</script>
{% endblock %}
