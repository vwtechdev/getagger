{% extends "base.html" %}
{% load static %}
{% block navbar %}{% endblock %}
{% block title %}Entrar — Getagger{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:100vh;margin:0">
    <div class="col-md-5 col-lg-4">
        <div class="card" style="border:1px solid #1E293B">
            <div class="card-body">
                <div class="text-center mb-4">
                    <img src="{% static 'img/logo.png' %}" alt="Getagger" height="72">
                </div>
                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                    <div class="alert alert-danger py-2 px-3 small mb-3">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">E-mail</label>
                        <input type="email" name="username" autofocus class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3" x-data="{ showPassword: false, pwInput: null }" x-init="pwInput = document.getElementById('id_password')">
                        <label class="form-label" for="id_password">Senha</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control" id="id_password" required>
                            <button type="button" class="btn btn-outline-secondary"
                                    @click="showPassword = !showPassword; pwInput.type = showPassword ? 'text' : 'password'"
                                    style="border-top-left-radius:0;border-bottom-left-radius:0;display:inline-flex;align-items:center;justify-content:center;gap:4px"
                                    aria-label="Mostrar senha">
                                <svg x-show="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg x-show="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                </form>
                <hr>
                <p class="text-center mb-0"><a href="{% url 'accounts:signup' %}">Criar conta</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
